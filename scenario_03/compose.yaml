name: kroxy-k4k-demo-03

services:
  kafka:
    hostname: kafka
    container_name: kafka
    image: quay.io/strimzi/kafka:0.47.0-kafka-4.0.0
    command: [
      "sh", "-c",
      "./bin/kafka-storage.sh format --standalone -t $${KAFKA_CLUSTER_ID} -c ./config/server.properties && ./bin/kafka-server-start.sh ./config/server.properties --override inter.broker.listener.name=$${KAFKA_INTER_BROKER_LISTENER_NAME} --override listener.security.protocol.map=$${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP} --override listeners=$${KAFKA_LISTENERS} --override controller.listener.names=$${KAFKA_CONTROLLER_LISTENER_NAMES} --override advertised.listeners=$${KAFKA_ADVERTISED_LISTENERS} --override num.partitions=$${KAFKA_NUM_PARTITIONS} --override group.min.session.timeout.ms=$${KAFKA_GROUP_MIN_SESSION_TIMEOUT_MS} --override message.max.bytes=16777216"
    ]
    environment:
      LOG_DIR: /tmp/logs
      KAFKA_CLUSTER_ID: DIAO2SH9SdGuqBkcKYXtiw
      KAFKA_ADVERTISED_LISTENERS: DOCKER_INSIDE://kafka:9092,DOCKER_OUTSIDE://localhost:29092
      KAFKA_LISTENERS: DOCKER_INSIDE://0.0.0.0:9092,DOCKER_OUTSIDE://0.0.0.0:29092,CONTROLLER://:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: DOCKER_INSIDE:PLAINTEXT,DOCKER_OUTSIDE:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER_INSIDE
      KAFKA_GROUP_MIN_SESSION_TIMEOUT_MS: 250
      KAFKA_NUM_PARTITIONS: 1
    networks:
      - kroxy-k4k-unclassified
      - kroxy-k4k-confidential
      - kroxy-k4k-topsecret

  schema-registry:
    hostname: schema-registry
    container_name: schema-registry
    image: confluentinc/cp-schema-registry:7.9.0
    depends_on:
      - kafka
    ports:
      - 8081:8081
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
    networks:
      - kroxy-k4k-unclassified
      - kroxy-k4k-confidential
      - kroxy-k4k-topsecret

  kroxylicious-unclassified:
    hostname: kroxylicious-unclassified
    container_name: kroxylicious-unclassified
    image: hpgrahsl/kroxy-k4k-filter:0.1.0-experimental
    volumes:
      - ./proxy_config_unclassified.yaml:/opt/kroxylicious/config/proxy.yaml:ro
    command: ["-c", "/opt/kroxylicious/config/proxy.yaml"]
    depends_on:
      - kafka
      - schema-registry
    environment:
      - JAVA_OPTIONS=--add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.nio=ALL-UNNAMED
    networks:
      - kroxy-k4k-unclassified

  kroxylicious-confidential:
    hostname: kroxylicious-confidential
    container_name: kroxylicious-confidential
    image: hpgrahsl/kroxy-k4k-filter:0.1.0-experimental
    volumes:
      - ./proxy_config_confidential.yaml:/opt/kroxylicious/config/proxy.yaml:ro
    command: ["-c", "/opt/kroxylicious/config/proxy.yaml"]
    depends_on:
      - kafka
      - schema-registry
    environment:
      - JAVA_OPTIONS=--add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.nio=ALL-UNNAMED
    networks:
      - kroxy-k4k-confidential

  kroxylicious-topsecret:
    hostname: kroxylicious-topsecret
    container_name: kroxylicious-topsecret
    image: hpgrahsl/kroxy-k4k-filter:0.1.0-experimental
    volumes:
      - ./proxy_config_topsecret.yaml:/opt/kroxylicious/config/proxy.yaml:ro
    command: ["-c", "/opt/kroxylicious/config/proxy.yaml"]
    depends_on:
      - kafka
      - schema-registry
    environment:
      - JAVA_OPTIONS=--add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.nio=ALL-UNNAMED
    networks:
      - kroxy-k4k-topsecret

networks:
  kroxy-k4k-unclassified:
    name: kroxy-k4k-unclassified
  kroxy-k4k-confidential:
    name: kroxy-k4k-confidential
  kroxy-k4k-topsecret:
    name: kroxy-k4k-topsecret
