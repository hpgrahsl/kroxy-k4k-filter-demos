---
# proxy filter configuration
management:
  endpoints:
    prometheus: {}

virtualClusters:
  - name: demo-cluster
    targetCluster:
      bootstrapServers: kafka:9092
    gateways:
      - name: demo-gateway
        portIdentifiesNode:
          bootstrapAddress: kroxylicious:9192
    logNetwork: false
    logFrames: false

filterDefinitions:
  - name: k4k-encrypt
    type: com.github.hpgrahsl.kroxylicious.filters.kryptonite.filter.KryptoniteEncryptionFilterFactory
    config:
      key_source: CONFIG
      cipher_algorithm: TINK/AES_GCM_ENVELOPE_KEYSET
      cipher_data_key_identifier: ""
      cipher_data_keys:
        - identifier: "tenant_a_kek"
          material:
            primaryKeyId: 10000
            key:
            - keyData:
                typeUrl: "type.googleapis.com/google.crypto.tink.AesGcmKey"
                value: "GiBdgAyKgdm8TASAWHEnF34NzaxHy8T8XY8iSuRJ2i6r5g=="
                keyMaterialType: "SYMMETRIC"
              status: "ENABLED"
              keyId: 10000
              outputPrefixType: "TINK"
            - keyData:
                typeUrl: "type.googleapis.com/google.crypto.tink.AesGcmKey"
                value: "GiB2Wjy7HI8nlSbVv+fAZUQfEwQMgursWfVmuWFP4gdFpw=="
                keyMaterialType: "SYMMETRIC"
              status: "ENABLED"
              keyId: 10001
              outputPrefixType: "TINK"
            - keyData:
                typeUrl: "type.googleapis.com/google.crypto.tink.AesGcmKey"
                value: "GiCHBh9lPt9P/idaatFPtJ4yeVDUQH3LzgS9/QAk++yNOw=="
                keyMaterialType: "SYMMETRIC"
              status: "ENABLED"
              keyId: 10002
              outputPrefixType: "TINK"
        - identifier: "tenant_b_kek"
          material:
            primaryKeyId: 10003
            key:
            - keyData:
                typeUrl: "type.googleapis.com/google.crypto.tink.AesGcmKey"
                value: "GiDojOj1wd7M0RvG6mjnVlQXb5HQwlWNUvrcLmGi1V1lYw=="
                keyMaterialType: "SYMMETRIC"
              status: "ENABLED"
              keyId: 10003
              outputPrefixType: "TINK"
            - keyData:
                typeUrl: "type.googleapis.com/google.crypto.tink.AesGcmKey"
                value: "GiBPDGCJFoi3SFO+I0xw3llXXvq94/N6fXvCz0bmPJWMcw=="
                keyMaterialType: "SYMMETRIC"
              status: "ENABLED"
              keyId: 10004
              outputPrefixType: "TINK"
            - keyData:
                typeUrl: "type.googleapis.com/google.crypto.tink.AesGcmKey"
                value: "GiAquC+DwZLERKurN0NunRlLVlj5sRUzkjB3iqNu5BHr3A=="
                keyMaterialType: "SYMMETRIC"
              status: "ENABLED"
              keyId: 10005
              outputPrefixType: "TINK"
      record_format: JSON
      topic_field_configs:
        - topic_pattern: tenant_a.*
          field_configs:
            - name: address
              keyId: tenant_a_kek
            - name: vitals
              keyId: tenant_a_kek
            - name: insurance
              keyId: tenant_a_kek
        - topic_pattern: tenant_b.*
          field_configs:
            - name: diagnoses
              fieldMode: ELEMENT
              keyId: tenant_b_kek
            - name: medications
              fieldMode: ELEMENT
              keyId: tenant_b_kek


  - name: k4k-decrypt
    type: com.github.hpgrahsl.kroxylicious.filters.kryptonite.filter.KryptoniteDecryptionFilterFactory
    config:
      key_source: CONFIG
      cipher_algorithm: TINK/AES_GCM_ENVELOPE_KEYSET
      cipher_data_key_identifier: ""
      cipher_data_keys:
        - identifier: "tenant_a_kek"
          material:
            primaryKeyId: 10000
            key:
            - keyData:
                typeUrl: "type.googleapis.com/google.crypto.tink.AesGcmKey"
                value: "GiBdgAyKgdm8TASAWHEnF34NzaxHy8T8XY8iSuRJ2i6r5g=="
                keyMaterialType: "SYMMETRIC"
              status: "ENABLED"
              keyId: 10000
              outputPrefixType: "TINK"
            - keyData:
                typeUrl: "type.googleapis.com/google.crypto.tink.AesGcmKey"
                value: "GiB2Wjy7HI8nlSbVv+fAZUQfEwQMgursWfVmuWFP4gdFpw=="
                keyMaterialType: "SYMMETRIC"
              status: "ENABLED"
              keyId: 10001
              outputPrefixType: "TINK"
            - keyData:
                typeUrl: "type.googleapis.com/google.crypto.tink.AesGcmKey"
                value: "GiCHBh9lPt9P/idaatFPtJ4yeVDUQH3LzgS9/QAk++yNOw=="
                keyMaterialType: "SYMMETRIC"
              status: "ENABLED"
              keyId: 10002
              outputPrefixType: "TINK"
        - identifier: "tenant_b_kek"
          material:
            primaryKeyId: 10003
            key:
            - keyData:
                typeUrl: "type.googleapis.com/google.crypto.tink.AesGcmKey"
                value: "GiDojOj1wd7M0RvG6mjnVlQXb5HQwlWNUvrcLmGi1V1lYw=="
                keyMaterialType: "SYMMETRIC"
              status: "ENABLED"
              keyId: 10003
              outputPrefixType: "TINK"
            - keyData:
                typeUrl: "type.googleapis.com/google.crypto.tink.AesGcmKey"
                value: "GiBPDGCJFoi3SFO+I0xw3llXXvq94/N6fXvCz0bmPJWMcw=="
                keyMaterialType: "SYMMETRIC"
              status: "ENABLED"
              keyId: 10004
              outputPrefixType: "TINK"
            - keyData:
                typeUrl: "type.googleapis.com/google.crypto.tink.AesGcmKey"
                value: "GiAquC+DwZLERKurN0NunRlLVlj5sRUzkjB3iqNu5BHr3A=="
                keyMaterialType: "SYMMETRIC"
              status: "ENABLED"
              keyId: 10005
              outputPrefixType: "TINK"
      record_format: JSON
      topic_field_configs:
        - topic_pattern: tenant_a.*
          field_configs:
            - name: address
            - name: vitals
            - name: insurance
        - topic_pattern: tenant_b.*
          field_configs:
            - name: diagnoses
              fieldMode: ELEMENT
            - name: medications
              fieldMode: ELEMENT

defaultFilters:
  - k4k-encrypt
  - k4k-decrypt
